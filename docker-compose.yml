services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hcp_crm
      POSTGRES_USER: hcp
      POSTGRES_PASSWORD: hcp
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U hcp -d hcp_crm]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql+asyncpg://hcp:hcp@db:5432/hcp_crm
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in .env}
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - 8080:80
    depends_on:
      - api

volumes:
  postgres_data:
